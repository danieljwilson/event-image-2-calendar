name: EventImage2Calendar
options:
  bundleIdPrefix: com.eventsnap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  EventImage2Calendar:
    type: application
    platform: iOS
    sources:
      - EventImage2Calendar
      - Shared
    settings:
      base:
        INFOPLIST_FILE: EventImage2Calendar/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eventsnap.EventImage2Calendar
        DEVELOPMENT_TEAM: RZ74J65XU2
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: EventImage2Calendar/EventImage2Calendar.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSCameraUsageDescription: "Used to photograph event posters"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Helps identify the city/region for event details"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Select event poster photos from your library"
    dependencies:
      - target: ShareExtension
    scheme:
      testTargets:
        - EventImage2CalendarTests
        - EventImage2CalendarUITests

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - Shared
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eventsnap.EventImage2Calendar.ShareExtension
        DEVELOPMENT_TEAM: RZ74J65XU2
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets: []

  EventImage2CalendarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - EventImage2CalendarTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eventsnap.EventImage2CalendarTests
        DEVELOPMENT_TEAM: RZ74J65XU2
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: EventImage2Calendar

  EventImage2CalendarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - EventImage2CalendarUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eventsnap.EventImage2CalendarUITests
        DEVELOPMENT_TEAM: RZ74J65XU2
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: EventImage2Calendar
