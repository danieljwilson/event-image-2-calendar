name: EventImage2Calendar
options:
  bundleIdPrefix: com.eventsnap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

targets:
  EventImage2Calendar:
    type: application
    platform: iOS
    sources:
      - EventImage2Calendar
    settings:
      base:
        INFOPLIST_FILE: EventImage2Calendar/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eventsnap.EventImage2Calendar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSCameraUsageDescription: "Used to photograph event posters"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Helps identify the city/region for event details"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Select event poster photos from your library"
        CLAUDE_API_KEY: $(CLAUDE_API_KEY)
