name = "event-digest-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Secrets (set via: wrangler secret put RESEND_API_KEY, etc.)
# RESEND_API_KEY - your Resend API key
# DIGEST_EMAIL_TO - your email address
# AUTH_TOKEN - shared secret for iOS app authentication

[vars]
DIGEST_EMAIL_FROM = "onboarding@resend.dev"

[[kv_namespaces]]
binding = "EVENTS"
id = "88cdb7c27c1d41169d84c817e2d86c34"

[triggers]
crons = ["0 8 * * *"]
